<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Powered PDF to Anki Converter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/krmanik/genanki-js/dist/genanki.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/browser-image-compression/dist/browser-image-compression.js"></script>

    <link rel="stylesheet" href="gemini-anki.css">
</head>

<body>
    <div id="app-container">
        <h1>Anki Converter Pro</h1>

        <div class="step-card">
            <div class="step-header">
                <div class="step-number">1</div>
                <div class="step-title">AI Configuration</div>
            </div>
            <div class="config-grid">
                <div>
                    <label for="ai-provider-select">AI Provider</label>
                    <select id="ai-provider-select">
                        <option value="gemini" selected>Google Gemini</option>
                        <option value="nvidia">NVIDIA NIM</option>
                    </select>
                </div>
                <div id="cors-proxy-container">
                    <label for="cors-proxy-input">CORS Proxy URL</label>
                    <input type="text" id="cors-proxy-input" value="https://corsproxy.io/?" placeholder="e.g. https://corsproxy.io/?">
                    <span class="badge-info">Required for NVIDIA unless using a browser extension.</span>
                </div>
                <div style="grid-column: 1 / -1;">
                    <label for="api-keys-textarea">API Keys (one per line)</label>
                    <textarea id="api-keys-textarea" rows="3" placeholder="Enter one or more API keys..."></textarea>
                    <div style="display: flex; gap: 10px; margin-top: 12px;">
                        <button id="save-key-button">Save Keys</button>
                        <button id="clear-key-button">Clear Keys</button>
                        <a id="api-key-help-link" href="https://aistudio.google.com/app/apikey" target="_blank" style="margin-left: auto; font-size: 0.875rem; color: var(--primary); text-decoration: none; align-self: center;">Need a key?</a>
                    </div>
                    <p id="provider-hint" class="badge-info" style="margin-top: 12px; font-size: 0.875rem;"></p>
                </div>
            </div>
        </div>

        <div class="step-card">
            <div class="step-header">
                <div class="step-number">2</div>
                <div class="step-title">Upload Documents</div>
            </div>
            <div id="drop-area">
                <form class="my-form">
                    <p style="margin-bottom: 16px; color: var(--text-light);">Drag & drop your PDF or click the button below</p>
                    <input type="file" id="file-input" accept="application/pdf" style="display: none;" multiple>
                    <label for="file-input" class="button" style="cursor: pointer;">Choose PDF File</label>
                </form>
            </div>
            <div id="file-list"></div>
        </div>

        <div class="step-card">
            <div class="step-header">
                <div class="step-number">3</div>
                <div class="step-title">Processing Options</div>
            </div>
            <div class="options-grid">
                <div style="grid-column: 1 / -1;">
                    <label for="grouping-model-select">AI Model for Analysis</label>
                    <select id="grouping-model-select"></select>
                    <small style="color: var(--text-light); display: block; margin-top: 6px;">
                        📄 = PDF Support &nbsp;&bull;&nbsp; ⭐ = Recommended
                    </small>
                </div>

                <div style="grid-column: 1 / -1;">
                    <label>Input Strategy</label>
                    <div class="radio-group">
                        <div class="radio-option">
                            <input type="radio" id="input-text" name="grouping-input" value="text">
                            <label for="input-text">
                                <b>Extracted Text</b>
                                <span class="badge-info">Fastest, works with all models.</span>
                            </label>
                        </div>
                        <div class="radio-option">
                            <input type="radio" id="input-file" name="grouping-input" value="file" checked>
                            <label for="input-file">
                                <b>Full PDF Upload</b>
                                <span class="badge-info">Best for complex layouts (if model supported).</span>
                            </label>
                        </div>
                    </div>
                </div>

                <div style="grid-column: 1 / -1; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; border-top: 1px solid var(--border); padding-top: 20px;">
                    <div>
                        <input type="checkbox" id="compress-images-checkbox" checked style="width: auto;">
                        <label for="compress-images-checkbox" style="display: inline; margin-left: 8px;">Compress images</label>
                    </div>
                    <div>
                        <input type="checkbox" id="auto-crop-checkbox" style="width: auto;">
                        <label for="auto-crop-checkbox" style="display: inline; margin-left: 8px;">Auto-crop borders</label>
                    </div>
                    <div>
                        <input type="checkbox" id="include-text-checkbox" checked style="width: auto;">
                        <label for="include-text-checkbox" style="display: inline; margin-left: 8px;">Include slide text</label>
                    </div>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <label for="max-resolution-input" style="margin-bottom: 0;">Max Width:</label>
                        <input type="number" id="max-resolution-input" value="1800" min="1" style="width: 80px; padding: 6px;">
                    </div>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <label for="max-size-input" style="margin-bottom: 0;">Max KB/Slide:</label>
                        <input type="number" id="max-size-input" value="500" min="50" style="width: 80px; padding: 6px;">
                    </div>
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <label for="max-parallel-input" style="margin-bottom: 0;">Parallelism:</label>
                        <input type="number" id="max-parallel-input" value="10" min="1" max="50" style="width: 80px; padding: 6px;">
                    </div>
                </div>

                <div style="grid-column: 1 / -1; background-color: #fffbeb; border: 1px solid #fef3c7; padding: 12px; border-radius: 8px;">
                    <div style="margin-bottom: 10px;">
                        <input type="checkbox" id="detailed-grouping-checkbox" style="width: auto;">
                        <label for="detailed-grouping-checkbox" style="display: inline; margin-left: 8px;"><b>Detailed Grouping</b> (smaller batches)</label>
                    </div>
                    <div>
                        <input type="checkbox" id="slide-by-slide-checkbox" style="width: auto;">
                        <label for="slide-by-slide-checkbox" style="display: inline; margin-left: 8px;"><b>Slide-by-Slide Mode</b> (maximum detail)</label>
                    </div>
                </div>
            </div>
        </div>

        <div class="action-section">
            <button id="generate-button" disabled>Generate Anki Deck</button>
            <div id="progress-area"></div>
            <div id="download-area"></div>
        </div>

        <div id="json-error" class="error-message" style="display: none;"></div>

        <div class="step-card" style="margin-top: 40px;">
            <button type="button" class="collapsible">View Conversion Stats</button>
            <div class="content">
                <div id="stats-area"></div>
            </div>
        </div>
    </div>

    <script>
        // --- Setup Libraries ---
        config = {
            locateFile: filename => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/${filename}`
        }
        var SQL;
        initSqlJs(config).then(function (sql) {
            SQL = sql;
        });
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        // --- Get DOM Elements ---
        const dropArea = document.getElementById('drop-area');
        const fileInput = document.getElementById('file-input');
        const generateButton = document.getElementById('generate-button');
        const fileList = document.getElementById('file-list');
        const progressArea = document.getElementById('progress-area');
        const statsArea = document.getElementById('stats-area');
        const downloadArea = document.getElementById('download-area');
        const apiKeysTextarea = document.getElementById('api-keys-textarea');
        const saveKeyButton = document.getElementById('save-key-button');
        const clearKeyButton = document.getElementById('clear-key-button');
        const jsonError = document.getElementById('json-error');

        const aiProviderSelect = document.getElementById('ai-provider-select');
        const apiKeyHelpLink = document.getElementById('api-key-help-link');
        const providerHint = document.getElementById('provider-hint');

        // --- Options ---
        const includeTextCheckbox = document.getElementById('include-text-checkbox');
        const compressImagesCheckbox = document.getElementById('compress-images-checkbox');
        const autoCropCheckbox = document.getElementById('auto-crop-checkbox');
        const maxResolutionInput = document.getElementById('max-resolution-input');
        const maxSizeInput = document.getElementById('max-size-input');
        const slideBySlideCheckbox = document.getElementById('slide-by-slide-checkbox');
        const detailedGroupingCheckbox = document.getElementById('detailed-grouping-checkbox');
        const groupingModelSelect = document.getElementById('grouping-model-select');
        const groupingInputText = document.getElementById('input-text');
        const groupingInputFile = document.getElementById('input-file');
        const maxParallelInput = document.getElementById('max-parallel-input');
        const corsProxyInput = document.getElementById('cors-proxy-input');

        const PROVIDER_DEFAULT_MODEL = {
            gemini: 'gemini-2.5-flash',
            nvidia: 'nvidia/nemotron-3-super-120b-a12b'
        };

        const PROVIDER_FALLBACK_CALL_MODEL = {
            gemini: 'gemini-2.5-flash-lite',
            nvidia: 'meta/llama-3.3-70b-instruct'
        };

        const PROVIDER_MODEL_OPTIONS = {
            gemini: [
                { value: 'gemini-2.5-flash-lite', label: 'Gemini 2.5 Flash Lite (Fast)', pdfSupport: true, recommended: false },
                { value: 'gemini-2.5-flash', label: 'Gemini 2.5 Flash (Advanced, Stable, Default)', pdfSupport: true, recommended: true },
                { value: 'gemini-2.5-pro', label: 'Gemini 2.5 Pro (Newest, Slower)', pdfSupport: true, recommended: false }
            ],
            nvidia: [
                // --- Top / Newest models ---
                { value: 'nvidia/nemotron-3-super-120b-a12b', label: 'Nemotron 3 Super 120B-A12B', pdfSupport: false, recommended: true },
                { value: 'qwen/qwen3.5-397b-a17b', label: 'Qwen 3.5 397B-A17B', pdfSupport: false, recommended: true },
                { value: 'deepseek-ai/deepseek-v3_2', label: 'DeepSeek V3.2', pdfSupport: false, recommended: true },
                { value: 'mistralai/mistral-large-3-675b-instruct-2512', label: 'Mistral Large 3 675B Instruct', pdfSupport: false, recommended: true },
                // --- Vision / Multimodal (NVIDIA Chat API currently assumes Images/Text, skipping direct PDF) ---
                { value: 'microsoft/phi-4-multimodal-instruct', label: 'Phi 4 Multimodal Instruct', pdfSupport: false, recommended: true },
                { value: 'meta/llama-3.2-11b-vision-instruct', label: 'Llama 3.2 11B Vision Instruct', pdfSupport: false, recommended: false },
                { value: 'meta/llama-3.2-90b-vision-instruct', label: 'Llama 3.2 90B Vision Instruct', pdfSupport: false, recommended: true },
                { value: 'nvidia/nemotron-nano-12b-v2-vl', label: 'Nemotron Nano 12B V2 VL', pdfSupport: false, recommended: false },
                { value: 'microsoft/phi-3.5-vision-instruct', label: 'Phi 3.5 Vision Instruct', pdfSupport: false, recommended: false },
                { value: 'nvidia/llama-3.1-nemotron-nano-vl-8b-v1', label: 'Llama 3.1 Nemotron Nano VL 8B', pdfSupport: false, recommended: false },
                { value: 'google/gemma-3-27b-it', label: 'Gemma 3 27B IT', pdfSupport: false, recommended: false },
                { value: 'nvidia/vila-40b', label: 'VILA 40B', pdfSupport: false, recommended: false },
                { value: 'moonshotai/kimi-k2.5', label: 'Kimi K2.5', pdfSupport: false, recommended: false },
                // --- Standard Language Models ---
                { value: 'meta/llama-3.3-70b-instruct', label: 'Llama 3.3 70B Instruct', pdfSupport: false, recommended: true },
                { value: 'qwen/qwq-32b', label: 'QwQ 32B', pdfSupport: false, recommended: false },
                { value: 'mistralai/mistral-small-24b-instruct', label: 'Mistral Small 24B Instruct', pdfSupport: false, recommended: false },
                { value: 'nvidia/cosmos-nemotron-34b-v1-vl', label: 'Cosmos Nemotron 34B V1 VL', pdfSupport: false, recommended: false },
                { value: 'nvidia/vila-1.5-40b', label: 'VILA 1.5 40B', pdfSupport: false, recommended: false }
            ]
        };

        const API_KEYS_STORAGE_KEY = 'geminiAnkiApiKeysByProvider';

        // --- State ---
        let pdfFiles = [];
        let keyPool = [];
        let groupingModelByProvider = { ...PROVIDER_DEFAULT_MODEL };

        // --- Event Listeners ---
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropArea.addEventListener(eventName, preventDefaults, false);
            document.body.addEventListener(eventName, preventDefaults, false);
        });
        ['dragenter', 'dragover'].forEach(eventName => {
            dropArea.addEventListener(eventName, highlight, false);
        });
        ['dragleave', 'drop'].forEach(eventName => {
            dropArea.addEventListener(eventName, unhighlight, false);
        });
        dropArea.addEventListener('drop', handleDrop, false);
        fileInput.addEventListener('change', handleFiles, false);
        generateButton.addEventListener('click', generateAnkiDecks, false);
        apiKeysTextarea.addEventListener('input', checkReady);
        aiProviderSelect.addEventListener('change', handleProviderChange);
        saveKeyButton.addEventListener('click', saveApiKeys);
        clearKeyButton.addEventListener('click', clearApiKeys);

        // Add listeners for all options
        [
            compressImagesCheckbox, includeTextCheckbox, slideBySlideCheckbox, 
            maxResolutionInput, maxSizeInput, groupingModelSelect,
            groupingInputText, groupingInputFile, detailedGroupingCheckbox,
            maxParallelInput, autoCropCheckbox, corsProxyInput
        ].forEach(el => { 
            if (el) {
                el.addEventListener('change', () => {
                    saveOptions();
                    syncGroupingInputState();
                });
            }
        });

        // --- Initial Load ---
        loadOptions();
        syncProviderUi();
        loadApiKeys();
        initRadioListeners();
        checkReady();

        // --- Drag and Drop Handlers ---
        function preventDefaults(e) { e.preventDefault(); e.stopPropagation(); }
        function highlight() { dropArea.classList.add('highlight'); }
        function unhighlight() { dropArea.classList.remove('highlight'); }
        function handleDrop(e) { handleFiles(e.dataTransfer.files); }

        function handleFiles(filesOrEvent) {
            let files;
            if (filesOrEvent instanceof Event) {
                files = filesOrEvent.target.files;
            } else {
                files = filesOrEvent;
            }

            if (files && files.length > 0) {
                // Convert FileList to Array and filter for PDFs
                const newFiles = Array.from(files).filter(f => f.type === 'application/pdf');
                
                // Add new files to the list if they aren't already there (by name/size)
                newFiles.forEach(newFile => {
                    const exists = pdfFiles.some(f => f.name === newFile.name && f.size === newFile.size);
                    if (!exists) {
                        pdfFiles.push(newFile);
                    }
                });

                updateFileList();
                checkReady();
            }
        }
        function updateFileList() {
            fileList.innerHTML = '<h3>Selected Files:</h3>';
            if (pdfFiles.length > 0) {
                pdfFiles.forEach((file, index) => {
                    const div = document.createElement('div');
                    div.className = 'file-item';
                    div.style.marginBottom = '8px';
                    div.innerHTML = `
                        <div style="display: flex; justify-content: space-between; align-items: center; padding: 8px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px;">
                            <span style="font-weight: 500;">${file.name}</span>
                            <span class="remove-file" style="cursor: pointer; color: #ef4444; font-size: 1.2rem; padding: 0 4px;" onclick="removeFile(${index})">&#10005;</span>
                        </div>
                    `;
                    fileList.appendChild(div);
                });
            } else {
                fileList.innerHTML = '<p style="color: var(--text-light); font-style: italic;">No files selected</p>';
            }
        }

        function removeFile(index) {
            pdfFiles.splice(index, 1);
            updateFileList();
            fileInput.value = ''; // Reset input to allow re-selecting same file
            checkReady();
        }

        function checkReady() {
            generateButton.disabled = !(pdfFiles.length > 0 && apiKeysTextarea.value.trim() !== '');
        }

        function getSelectedProvider() {
            return aiProviderSelect.value === 'nvidia' ? 'nvidia' : 'gemini';
        }

        function getProviderName(provider = getSelectedProvider()) {
            return provider === 'nvidia' ? 'NVIDIA' : 'Gemini';
        }

        function buildProviderModelSelect(provider) {
            const options = PROVIDER_MODEL_OPTIONS[provider] || PROVIDER_MODEL_OPTIONS.gemini;
            groupingModelSelect.innerHTML = options
                .map(option => {
                    let badge = '';
                    if (option.pdfSupport) badge += '📄 ';
                    if (option.recommended) badge += '⭐ ';
                    return `<option value="${option.value}">${badge}${option.label}</option>`;
                })
                .join('');

            let selectedModel = groupingModelByProvider[provider] || PROVIDER_DEFAULT_MODEL[provider];
            const hasSelected = options.some(option => option.value === selectedModel);
            if (!hasSelected) {
                selectedModel = options[0].value;
            }
            groupingModelSelect.value = selectedModel;
            groupingModelByProvider[provider] = selectedModel;
        }

        function syncProviderUi() {
            const provider = getSelectedProvider();
            const isNvidia = provider === 'nvidia';

            apiKeyHelpLink.href = isNvidia
                ? 'https://build.nvidia.com/'
                : 'https://aistudio.google.com/app/apikey';
            apiKeyHelpLink.textContent = isNvidia
                ? 'Get your NVIDIA API key here'
                : 'Get your Gemini API key here';

            providerHint.textContent = isNvidia
                ? 'NVIDIA mode uses extracted text by default. Vision models marked with 📄 can also attempt direct document input. Gemini is generally recommended for PDFs.'
                : 'Gemini mode supports both text and direct PDF grouping inputs.';

            const corsProxyContainer = document.getElementById('cors-proxy-container');
            if (corsProxyContainer) {
                corsProxyContainer.style.display = isNvidia ? 'block' : 'none';
            }

            buildProviderModelSelect(provider);
            syncGroupingInputState();
            initRadioListeners();
        }

        function syncGroupingInputState() {
            const provider = getSelectedProvider();
            const selectedModelValueRaw = groupingModelSelect.value;
            
            if (!selectedModelValueRaw) {
                console.warn("[Sync] No model selected yet, skipping sync.");
                return;
            }

            const selectedModelValue = selectedModelValueRaw.trim().toLowerCase();

            // 1. Search for model metadata across all providers with fuzzy matching
            let selectedOption = null;
            for (const p in PROVIDER_MODEL_OPTIONS) {
                const found = PROVIDER_MODEL_OPTIONS[p].find(o => {
                    const val = o.value.trim().toLowerCase();
                    return val === selectedModelValue || val.split('/').pop() === selectedModelValue.split('/').pop();
                });
                if (found) {
                    selectedOption = found;
                    break;
                }
            }
            
            // 2. Check for the 📄 icon in the UI text as a failsafe
            const selectedIndex = groupingModelSelect.selectedIndex;
            const selectedText = selectedIndex !== -1 ? groupingModelSelect.options[selectedIndex].text : '';
            const hasPdfIcon = selectedText.includes('📄');
            
            const supportsPdf = hasPdfIcon || (selectedOption ? !!selectedOption.pdfSupport : (provider === 'gemini'));
            console.log(`[Sync] Provider: ${provider}, Model: ${selectedModelValueRaw}, HasIcon: ${hasPdfIcon}, SupportsPDF: ${supportsPdf}`);

            // Update UI
            groupingInputFile.disabled = !supportsPdf;
            const parent = groupingInputFile.closest('.radio-option');
            
            if (parent) {
                if (!supportsPdf) {
                    parent.classList.add('disabled-option');
                    parent.style.opacity = '0.4';
                    parent.style.cursor = 'not-allowed';
                    parent.title = "This model does not support direct PDF upload. Switch to a vision-capable model (📄).";
                } else {
                    parent.classList.remove('disabled-option');
                    parent.style.opacity = '1';
                    parent.style.cursor = 'pointer';
                    parent.title = "Directly upload the PDF for analysis.";
                }
            }

            // ONLY auto-switch to text if the user CURRENTLY has file selected AND it's strictly not supported
            if (!supportsPdf && groupingInputFile.checked) {
                console.log("[Sync] Auto-switching to text because model lacks PDF support.");
                groupingInputText.checked = true;
                groupingInputFile.checked = false;
                saveOptions();
            }
        }

        // Initialize radio-option listeners
        function initRadioListeners() {
            document.querySelectorAll('.radio-option').forEach(option => {
                // Remove existing to avoid duplicates if called multiple times
                option.onclick = null; 
                option.onclick = (e) => {
                    const radio = option.querySelector('input[type="radio"]');
                    if (radio && !radio.disabled) {
                        if (e.target !== radio) {
                            radio.checked = true;
                            // Trigger change manually
                            radio.dispatchEvent(new Event('change', { bubbles: true }));
                        }
                    } else if (radio && radio.disabled) {
                        console.warn("Cannot select disabled option.");
                    }
                };
            });
        }

        function handleProviderChange() {
            syncProviderUi();
            loadApiKeys();
            saveOptions();
            checkReady();
        }

        function loadProviderKeyStore() {
            const raw = localStorage.getItem(API_KEYS_STORAGE_KEY);
            if (!raw) {
                return {};
            }

            try {
                const parsed = JSON.parse(raw);
                if (parsed && typeof parsed === 'object') {
                    return parsed;
                }
            } catch (error) {
                console.warn('Failed to parse provider key store:', error);
            }
            return {};
        }

        function saveProviderKeyStore(keyStore) {
            localStorage.setItem(API_KEYS_STORAGE_KEY, JSON.stringify(keyStore));
        }

        // --- API Key Storage Functions ---
        function saveApiKeys() {
            const apiKeys = apiKeysTextarea.value;
            if (apiKeys) {
                const provider = getSelectedProvider();
                const keyStore = loadProviderKeyStore();
                keyStore[provider] = apiKeys;
                saveProviderKeyStore(keyStore);

                // Backwards compatibility for existing Gemini-only storage.
                if (provider === 'gemini') {
                    localStorage.setItem('geminiAnkiApiKeys', apiKeys);
                }
                alert('API Keys saved to browser storage.');
            } else {
                alert('Please enter at least one API key to save.');
            }
        }

        function clearApiKeys() {
            const provider = getSelectedProvider();
            const keyStore = loadProviderKeyStore();
            delete keyStore[provider];
            saveProviderKeyStore(keyStore);

            if (provider === 'gemini') {
                localStorage.removeItem('geminiAnkiApiKeys');
            }

            apiKeysTextarea.value = '';
            checkReady();
            alert('API Keys cleared from browser storage.');
        }

        function loadApiKeys() {
            const provider = getSelectedProvider();
            const keyStore = loadProviderKeyStore();
            let savedKeys = keyStore[provider];

            // Backwards compatibility with old Gemini key storage.
            if (!savedKeys && provider === 'gemini') {
                savedKeys = localStorage.getItem('geminiAnkiApiKeys');
            }

            apiKeysTextarea.value = '';
            if (savedKeys) {
                apiKeysTextarea.value = savedKeys;
            }
            checkReady();
        }

        // --- Options Storage Functions ---
        function saveOptions() {
            const provider = getSelectedProvider();
            groupingModelByProvider[provider] = groupingModelSelect.value;

            localStorage.setItem('geminiAnkiOptions', JSON.stringify({
                compressImages: compressImagesCheckbox ? compressImagesCheckbox.checked : true,
                autoCrop: autoCropCheckbox ? autoCropCheckbox.checked : false,
                includeText: includeTextCheckbox ? includeTextCheckbox.checked : true,
                maxResolution: maxResolutionInput ? maxResolutionInput.value : "1800",
                maxSize: maxSizeInput ? maxSizeInput.value : "500",
                slideBySlide: slideBySlideCheckbox ? slideBySlideCheckbox.checked : false,
                detailedGrouping: detailedGroupingCheckbox ? detailedGroupingCheckbox.checked : true,
                aiProvider: provider,
                groupingModel: groupingModelSelect ? groupingModelSelect.value : PROVIDER_DEFAULT_MODEL[provider],
                groupingModelByProvider: groupingModelByProvider,
                groupingInput: groupingInputText && groupingInputText.checked ? 'text' : 'file',
                maxParallel: maxParallelInput ? maxParallelInput.value : "10",
                corsProxyUrl: corsProxyInput ? corsProxyInput.value : "https://corsproxy.io/?"
            }));
        }

        function loadOptions() {
            const savedOptions = localStorage.getItem('geminiAnkiOptions');
            if (savedOptions) {
                try {
                    const options = JSON.parse(savedOptions);
                    // Set values, providing defaults for undefined properties
                    compressImagesCheckbox.checked = options.compressImages !== false; // default true
                    autoCropCheckbox.checked = options.autoCrop === true; // default false
                    includeTextCheckbox.checked = options.includeText !== false; // default true
                    slideBySlideCheckbox.checked = options.slideBySlide === true; // default false
                    detailedGroupingCheckbox.checked = options.detailedGrouping !== false; // default true
                    if (options.maxResolution) maxResolutionInput.value = options.maxResolution;

        // --- Main Anki Generation Logic ---
        async function generateAnkiDecks() {
            generateButton.disabled = true;
            jsonError.style.display = 'none';
            statsArea.innerHTML = '';
            downloadArea.innerHTML = '';
            updateProgress("Starting...", 0);

            if (pdfFiles.length === 0 || !apiKeysTextarea.value.trim()) {
                showError("Please provide at least one PDF file and at least one API key.");
                return;
            }

            // Initialize the key pool
            const apiKeysString = apiKeysTextarea.value.trim();
            keyPool = apiKeysString.split('\n')
                .filter(k => k.trim() !== '')
                .map(key => ({ key: key.trim(), availableAt: 0 }));

            if (keyPool.length === 0) {
                showError("Please provide at least one valid API Key.");
                return;
            }

            try {
                const totalFiles = pdfFiles.length;
                for (let i = 0; i < totalFiles; i++) {
                    const currentFile = pdfFiles[i];
                    const filePrefix = totalFiles > 1 ? `[File ${i + 1}/${totalFiles}] ${currentFile.name}: ` : "";
                    
                    updateProgress(`${filePrefix}Initialising...`, (i / totalFiles) * 100);
                    
                    try {
                        await processSingleFile(currentFile, filePrefix, i, totalFiles);
                    } catch (error) {
                        console.error(`Error processing file ${currentFile.name}:`, error);
                        showError(`${filePrefix} Failed: ${error.message}`);
                        // Continue to next file? Let's stop on error for now to be safe, but the user might want "skip and continue".
                        // For now, let's stop.
                        return;
                    }
                }

                updateProgress("All files processed successfully!", 100);

            } catch (error) {
                showError(`A critical error occurred: ${error.message}`);
                console.error(error);
            } finally {
                generateButton.disabled = false;
            }
        }

        async function processSingleFile(currentPdfFile, filePrefix, fileIndex, totalFiles) {
            let pdfDoc;

            // Get options
            const aiProvider = getSelectedProvider();
            const groupingModel = groupingModelSelect.value;
            const options = PROVIDER_MODEL_OPTIONS[aiProvider] || [];
            const selectedOption = options.find(o => o.value === groupingModel);
            const supportsPdf = selectedOption ? selectedOption.pdfSupport : (aiProvider === 'gemini');

            let groupingInput = groupingInputText.checked ? 'text' : 'file';

            if (groupingInput === 'file' && !supportsPdf) {
                groupingInput = 'text';
                // Note: We don't update the UI check here since we are mid-process, but we log it.
                console.warn(`Selected model ${groupingModel} does not support PDF upload for ${currentPdfFile.name}. Switching to text.`);
            }

            const baseProgress = (fileIndex / totalFiles) * 100;
            const nextBaseProgress = ((fileIndex + 1) / totalFiles) * 100;
            const progressStep = (percent) => baseProgress + (percent / 100) * (nextBaseProgress - baseProgress);

            updateProgress(`${filePrefix}Loading PDF...`, progressStep(5));
            pdfDoc = await pdfjsLib.getDocument(URL.createObjectURL(currentPdfFile)).promise;

            let allPagesText = null;
            let pdfDataB64 = null;

            if (groupingInput === 'file') {
                updateProgress(`${filePrefix}Reading PDF for upload...`, progressStep(15));
                pdfDataB64 = await fileToBase64(currentPdfFile);
            } else {
                updateProgress(`${filePrefix}Extracting text from all pages...`, progressStep(10));
                allPagesText = await extractAllText(pdfDoc);
            }

            updateProgress(`${filePrefix}Asking AI to group and filter slides...`, progressStep(20));
            const groupingJSON = await callGeminiForGrouping(allPagesText, groupingModel, groupingInput, pdfDataB64);

            if (!groupingJSON || !Array.isArray(groupingJSON)) {
                throw new Error("AI did not return valid JSON for grouping.");
            }

            updateProgress(`${filePrefix}AI grouping received. Starting deck generation...`, progressStep(30));
            await createDeckFromConfig(pdfDoc, groupingJSON, currentPdfFile, filePrefix, progressStep);
        }

        /**
         * Extracts text from every page of the PDF.
         */
        async function extractAllText(pdfDoc) {
            let allText = '';
            for (let pageNum = 1; pageNum <= pdfDoc.numPages; pageNum++) {
                const page = await pdfDoc.getPage(pageNum);
                const textContent = await page.getTextContent();
                const pageText = textContent.items.map(item => item.str).join(' ');
                allText += `\n\n--- PAGE ${pageNum} ---\n${pageText}\n`;
            }
            return allText;
        }

        // --- Helper function for sleeping ---
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // --- Countdown Timer ---
        async function showWaitingCountdown(totalWaitMs, baseMessage, percentage) {
            updateProgress(`${baseMessage} Waiting for ${Math.ceil(totalWaitMs / 1000)}s...`, percentage);
            await sleep(totalWaitMs);
        }

        // --- Base64 Helper ---
        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => {
                    const base64Data = reader.result.split(',')[1];
                    resolve(base64Data);
                };
                reader.onerror = error => reject(error);
            });
        }

        // --- Universal API caller with retry logic ---
        async function callGeminiWithRetry(prompt, generationConfig = null, model = null, fileBytesBase64 = null) {
            if (!keyPool || keyPool.length === 0) {
                throw new Error("API Key pool is empty.");
            }

            const provider = getSelectedProvider();
            const providerName = getProviderName(provider);
            const selectedModel = model || PROVIDER_FALLBACK_CALL_MODEL[provider];
            let retryCount = 0;

            while (true) {
                const now = Date.now();
                
                let keyEntry = null;
                for (const entry of keyPool) {
                    if (now >= entry.availableAt) {
                        keyEntry = entry;
                        break;
                    }
                }
                
                const progressBarFill = document.querySelector('.progress-bar-fill');
                const currentPercentage = progressBarFill ? progressBarFill.style.width : '0%';
                const currentProgressMessage = progressArea.querySelector('p') ? progressArea.querySelector('p').textContent : 'Processing...';

                if (!keyEntry) {
                    const soonestAvailableTime = Math.min(...keyPool.map(k => k.availableAt));
                    const waitMs = (soonestAvailableTime - now) + 1000;
                    
                    console.warn(`All keys busy/rate-limited. Waiting for ${waitMs / 1000}s...`);
                    
                    await showWaitingCountdown(waitMs, `All keys busy. Pausing... (Retry #${retryCount})`, currentPercentage);
                    
                    updateProgress(currentProgressMessage, currentPercentage);
                    continue;
                }

                const apiKey = keyEntry.key;
                let url = '';
                let body = {};
                const headers = { 'Content-Type': 'application/json' };

                if (provider === 'gemini') {
                    url = `https://generativelanguage.googleapis.com/v1beta/models/${selectedModel}:generateContent?key=${apiKey}`;

                    const parts = [{ text: prompt }];
                    if (fileBytesBase64) {
                        parts.push({
                            inlineData: {
                                mimeType: 'application/pdf',
                                data: fileBytesBase64
                            }
                        });
                    }

                    body = {
                        contents: [{ parts: parts }]
                    };

                    if (generationConfig) {
                        body.generationConfig = generationConfig;
                    }
                } else {
                    const baseNvidiaUrl = 'https://integrate.api.nvidia.com/v1/chat/completions';
                    const proxyUrl = document.getElementById('cors-proxy-input').value.trim();
                    url = proxyUrl ? proxyUrl + baseNvidiaUrl : baseNvidiaUrl;

                    headers.Authorization = `Bearer ${apiKey}`;
                    
                    let content = prompt;
                    if (fileBytesBase64) {
                        // Multimodal format for NVIDIA NIM. (Note: Many NIH models expect images, application/pdf support varies)
                        content = [
                            { type: 'text', text: prompt },
                            { 
                                type: 'image_url', 
                                image_url: { url: `data:application/pdf;base64,${fileBytesBase64}` } 
                            }
                        ];
                    }

                    body = {
                        model: selectedModel,
                        messages: [{ role: 'user', content: content }],
                        temperature: 0.2
                    };
                }

                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers,
                        body: JSON.stringify(body)
                    });

                    if (response.ok) {
                        const data = await response.json();

                        if (provider === 'gemini') {
                            if (data.candidates && data.candidates[0].content && data.candidates[0].content.parts[0]) {
                                return data.candidates[0].content.parts[0].text;
                            }
                            throw new Error("Invalid successful response structure from Gemini.");
                        }

                        const nvidiaText = data?.choices?.[0]?.message?.content;
                        if (typeof nvidiaText === 'string' && nvidiaText.trim()) {
                            return nvidiaText;
                        }
                        if (Array.isArray(nvidiaText)) {
                            return nvidiaText.map(part => typeof part === 'string' ? part : part?.text || '').join('\n').trim();
                        }
                        throw new Error("Invalid successful response structure from NVIDIA.");
                    }

                    const rawError = await response.text();
                    let errorMessage = rawError || "Unknown API error";
                    try {
                        const parsedError = JSON.parse(rawError);
                        errorMessage = parsedError.error?.message
                            || parsedError.message
                            || parsedError.detail
                            || errorMessage;
                    } catch (_) {
                        // Keep raw response text as the error message.
                    }

                    const retryAfterHeader = response.headers.get('retry-after');
                    let waitTimeS = null;
                    if (retryAfterHeader && !isNaN(Number(retryAfterHeader))) {
                        waitTimeS = Number(retryAfterHeader);
                    } else {
                        const match = errorMessage.match(/retry in ([\d.]+)s/i);
                        if (match && match[1]) {
                            waitTimeS = parseFloat(match[1]);
                        }
                    }

                    if (response.status === 503 || response.status === 504 || /overloaded|temporarily unavailable|timeout/i.test(errorMessage)) {
                        const waitMs = 15000;
                        keyEntry.availableAt = Date.now() + waitMs;

                        console.warn(`${providerName} model overloaded for key ...${apiKey.slice(-4)}. Retrying after ${waitMs / 1000}s.`);
                        updateProgress(`Model overloaded (Key: ...${apiKey.slice(-4)}). Trying next key... (Retry #${retryCount})`, currentPercentage);
                        await sleep(500);
                        updateProgress(currentProgressMessage, currentPercentage);

                        retryCount++;
                        continue;
                    }

                    const isRateLimit = response.status === 429
                        || /quota exceeded|rate limit|too many requests/i.test(errorMessage);

                    if (isRateLimit && waitTimeS === null) {
                        waitTimeS = 30;
                    }

                    if (isRateLimit && waitTimeS !== null) {
                        if (waitTimeS > 300) {
                            throw new Error(`Rate limit retry time (${waitTimeS.toFixed(1)}s) for key ending in ...${apiKey.slice(-4)} exceeds 5 minutes. Aborting. Full error: ${errorMessage}`);
                        }

                        const waitMs = (waitTimeS * 1000) + 1000;
                        keyEntry.availableAt = Date.now() + waitMs;

                        console.warn(`${providerName} rate limit hit for key ...${apiKey.slice(-4)}. Setting cool-down for ${waitTimeS.toFixed(1)}s.`);
                        updateProgress(`Key ...${apiKey.slice(-4)} rate-limited. Trying next key... (Retry #${retryCount})`, currentPercentage);
                        await sleep(500);
                        updateProgress(currentProgressMessage, currentPercentage);

                        retryCount++;
                        continue;
                    }

                    if (response.status === 401 || response.status === 403) {
                        keyEntry.availableAt = Date.now() + 86400000;
                        console.error(`API Key ...${apiKey.slice(-4)} is invalid or unauthorized. Disabling it for 24h. Error: ${errorMessage}`);
                        updateProgress(`Key ...${apiKey.slice(-4)} is unauthorized. Trying next... (Retry #${retryCount})`, currentPercentage);
                        await sleep(500);
                        updateProgress(currentProgressMessage, currentPercentage);
                        retryCount++;
                        continue;
                    }

                    if (response.status === 400) {
                        console.error(`Bad request (Key: ...${apiKey.slice(-4)}): ${errorMessage}`);
                        throw new Error(`API Bad Request (400): ${errorMessage}. This usually means the model configuration or input format is unsupported.`);
                    }

                    throw new Error(`${providerName} API error (Key: ...${apiKey.slice(-4)}): ${errorMessage}`);

                } catch (error) {
                    if (error instanceof Error && error.message.includes('text-only grouping input')) {
                        throw error;
                    }

                    console.error(`Network or fetch error (Key: ...${apiKey.slice(-4)}):`, error);
                    keyEntry.availableAt = Date.now() + 30000;
                    console.warn(`Pausing key ...${apiKey.slice(-4)} for 30s due to network error.`);
                    retryCount++;
                    continue;
                }
            }
        }


        /**
         * First Gemini call: To group slides and remove unwanted ones.
         */
        async function callGeminiForGrouping(allPagesText, model, inputType, pdfDataB64) {
            let prompt;
            let filePayload = null;
            const config = { responseMimeType: "application/json" };
            const useDetailedGrouping = detailedGroupingCheckbox.checked;

            const step1Instruction = useDetailedGrouping
                ? `Step 1: Identify Logical Sections
                - Your goal is to create **small, focused groups**.
                - A group should ideally cover only **one or two key concepts** and be **1-4 slides long**.
                - **Do NOT create large groups** (e.g., 10+ slides).
                - It is better to have many small, specific groups than a few large, general ones.
                - For titles, if creating subtopics of a larger topic, format as "Main Topic: Specific Subtopic".`
                : `Step 1: Identify Logical Sections
                Group pages together that cover a single, distinct topic.`;

                        if (inputType === 'file') {
                                prompt = `
                                Task:
                                Analyze the provided PDF presentation and structure it for Anki card creation.
                
                                ${step1Instruction}

                                Step 2: Filter Only Truly Useless Slides
                                - Only REMOVE slides that are purely administrative or structural and contain NO actual new content.
                                - Examples of slides to remove:
                                    - Main title pages (e.g., "Presentation Title", "By [Author]")
                                    - Section divider slides (e.g., "Part 2: The Next Step")
                                    - "Agenda", "Outline", or "Overview" slides.
                                    - "Learning Objectives" slides.
                                    - "Thank you", "Questions?", or "Contact Information" slides.
                                    - Slides that are blank or have almost no content (e.g., just a title and no body, or a single image).
                                - DO NOT remove any slide that introduces new information, concepts, or explanations, even if it is labeled as a summary, recap, or conclusion, as long as it contains actual new content.
                                - For incremental slides (where one slide builds on the previous one), identify the *final* slide in that sequence and include ONLY that final slide in the "pages" array.
                
                                Step 3: Output Format (JSON)
                                Return ONLY a valid JSON array following this structure. Do not include any other text or markdown fences.
                                The page numbers should be 1-based (e.g., the first page is 1).
                
                                - **Language:** Your response (especially the "title" fields) **must** be in the primary language detected from the input (e.g., if the text is in German, the titles must be in German).

                                [
                                    {
                                        "title": "A descriptive title for this section",
                                        "pages": [/* array of page numbers (integers) in this group */]
                                    },
                                    {
                                        "title": "Title for the next section",
                                        "pages": [/* ... */]
                                    }
                                ]
                
                                Analyze the attached PDF file and return the JSON.
                                `;
                                filePayload = pdfDataB64;
                        } else {
                                prompt = `
                                Task:
                                Analyze the provided text content from a slide presentation and structure it for Anki card creation.
                                The text is formatted with "--- PAGE [number] ---" delimiters.
                
                                ${step1Instruction}

                                Step 2: Filter Only Truly Useless Slides
                                - Only REMOVE slides that are purely administrative or structural and contain NO actual new content.
                                - Examples of slides to remove:
                                    - Main title pages (e.g., "Presentation Title", "By [Author]")
                                    - Section divider slides (e.g., "Part 2: The Next Step")
                                    - "Agenda", "Outline", or "Overview" slides.
                                    - "Learning Objectives" slides.
                                    - "Thank you", "Questions?", or "Contact Information" slides.
                                    - Slides that are blank or have almost no content (e.g., just a title and no body, or a single image).
                                - DO NOT remove any slide that introduces new information, concepts, or explanations, even if it is labeled as a summary, recap, or conclusion, as long as it contains actual new content.
                                - For incremental slides (where one slide builds on the previous one), identify the *final* slide in that sequence and include ONLY that final slide in the "pages" array.
                
                                Step 3: Output Format (JSON)
                                Return ONLY a valid JSON array following this structure. Do not include any other text or markdown fences.

                                - **Language:** Your response (especially the "title" fields) **must** be in the primary language detected from the input (e.g., if the text is in German, the titles must be in German).
                
                                [
                                    {
                                        "title": "A descriptive title for this section",
                                        "pages": [/* array of page numbers (integers) in this group */]
                                    },
                                    {
                                        "title": "Title for the next section",
                                        "pages": [/* ... */]
                                    }
                                ]
                
                                Here is the slide text:
                                ${allPagesText}
                                `;
                                filePayload = null;
                        }
            
            let jsonString = await callGeminiWithRetry(prompt, config, model, filePayload);

            if (typeof jsonString === 'string') {
                const firstBrace = jsonString.indexOf('[');
                const firstCurly = jsonString.indexOf('{');
                
                let start = -1;
                
                if (firstBrace === -1 && firstCurly === -1) {
                    console.error("AI response did not contain JSON:", jsonString);
                    throw new Error("AI response did not contain a JSON array or object.");
                }

                if (firstBrace === -1) start = firstCurly;
                else if (firstCurly === -1) start = firstBrace;
                else start = Math.min(firstBrace, firstCurly);

                const lastBrace = jsonString.lastIndexOf(']');
                const lastCurly = jsonString.lastIndexOf('}');
                
                let end = Math.max(lastBrace, lastCurly);

                if (start === -1 || end === -1 || end < start) {
                     console.error("AI response had mismatched delimiters:", jsonString);
                     throw new Error("AI response had mismatched JSON delimiters.");
                }

                jsonString = jsonString.substring(start, end + 1);
            } else {
                return jsonString;
            }

            try {
                return JSON.parse(jsonString);
            } catch (e) {
                console.error("Failed to parse cleaned JSON string:", jsonString);
                throw new Error(`AI returned malformed JSON after cleaning: ${e.message}`);
            }
        }

        /**
         * Processes a single section (group of slides) and returns a Note object and stats.
         * This function is designed to be run in parallel.
         */
        async function processSection(pdfDoc, section, sectionIndex, model, baseTimestamp) {
            if (!section.pages || section.pages.length === 0) {
                // Return null or throw an error to be caught by allSettled
                throw new Error(`Section "${section.title}" has no pages.`);
            }

            // Get options from the DOM
            const slideBySlideMode = document.getElementById('slide-by-slide-checkbox').checked;
            const includeText = document.getElementById('include-text-checkbox').checked;
            
            let finalBackField = '';
            let finalBackContentField = '';
            
            const groupedText = await extractTextForPages(pdfDoc, section.pages);

            if (slideBySlideMode) {
                // --- Slide-by-Slide Mode ---
                const slidePromises = section.pages.map(async (pageNum) => {
                    const imageHtml = await renderImageForPage(pdfDoc, pageNum);
                    const pageText = await extractTextForPage(pdfDoc, pageNum);
                    let annotation = await callGeminiForSlideAnnotation(pageText);
                    
                    let html = imageHtml;
                    if (annotation.trim() && !annotation.includes("")) {
                        html += `<div class="slide-annotation">${annotation}</div>`;
                    }
                    return html;
                });
                
                const slideHtmls = await Promise.all(slidePromises);
                finalBackField = slideHtmls.join('');
                finalBackContentField = '';

            } else {
                // --- Default (Group) Mode ---
                const imagePromise = renderImagesForPages(pdfDoc, section.pages);
                const explanationPromise = callGeminiForExplanation(groupedText);

                const [imageResult, explanation] = await Promise.all([
                    imagePromise,
                    explanationPromise
                ]);

                finalBackField = imageResult.combinedImageHtml;
                finalBackContentField = explanation;
            }

            const orderField = `${baseTimestamp}${sectionIndex.toString().padStart(4, '0')}`;
            const textSearchField = includeText ? groupedText : '';

            const note = model.note([
                orderField,
                section.title,
                finalBackField,
                finalBackContentField,
                textSearchField
            ]);
            
            const stats = [section.title, section.pages.length, section.pages[0]];
            
            return { note, stats };
        }


        /**
         * Creates the .apkg file based on the AI's grouping.
         */
        async function createDeckFromConfig(pdfDoc, jsonConfig, currentPdfFile, filePrefix = "", progressStep = (p) => p) {
            // --- Model and Deck Setup ---
            const m = new Model({
                name: "AI Slides - " + Date.now(),
                id: "1543634829845", 
                flds: [
                    { name: "Order" },      
                    { name: "Front" },      
                    { name: "Back" },       
                    { name: "BackContent" },
                    { name: "Text" },       
                ],
                req: [[0, "all", [0]]],
                tmpls: [{
                    name: "Card 1",
                    qfmt: "{{Front}}",
                    afmt: "{{FrontSide}}<hr id=answer>{{Back}}<br><div class=\"back-content\">{{BackContent}}</div>",
                }],
                css: `
                    .card { font-family: arial; font-size: 20px; text-align: center; color: black; }
                    .back-content { font-size: 16px; display: inline-block; text-align: left; width: 100%; max-width: 700px; line-height: 1.6; margin: 10px auto; padding: 10px; border-radius: 5px; border: 1px solid #eee; }
                    .slide-annotation {
                        font-size: 14px;
                        display: inline-block;
                        text-align: left;
                        width: 100%;
                        max-width: 700px;
                        line-height: 1.5;
                        margin: 5px auto 15px auto;
                        padding: 10px;
                        background-color: #f0f0f0;
                        border-radius: 5px;
                        border: 1px solid #ddd;
                    }
                    h2 { display: inline; }
                    img { max-width: 95%; height: auto; }
                `,
            });

            const deckName = currentPdfFile.name.replace(/\.[^/.]+$/, "");
            const d = new Deck(Date.now(), deckName);
            const baseTimestamp = new Date().getTime();

            // --- Concurrency Limit Logic ---
            const totalSections = jsonConfig.length;
            const maxParallelThreads = parseInt(maxParallelInput.value) || 10;
            updateProgress(`${filePrefix}Processing ${totalSections} sections...`, progressStep(30));
            
            const results = new Array(totalSections).fill(null);
            let completedCount = 0;

            const runTask = async (index) => {
                const section = jsonConfig[index];
                try {
                    const result = await processSection(pdfDoc, section, index, m, baseTimestamp);
                    results[index] = { status: 'fulfilled', value: result };
                } catch (error) {
                    results[index] = { status: 'rejected', reason: error };
                }
                
                completedCount++;
                const progressPercent = 30 + (completedCount / totalSections) * 65;
                updateProgress(`${filePrefix}Processing section ${completedCount} of ${totalSections}...`, progressStep(progressPercent));
            };

            const pool = new Set();
            
            for (let i = 0; i < totalSections; i++) {
                const promise = runTask(i);
                pool.add(promise);
                
                promise.then(() => pool.delete(promise));

                if (pool.size >= maxParallelThreads) {
                    await Promise.race(pool);
                }
            }
            
            await Promise.allSettled(Array.from(pool));
            // --- End Concurrency Logic ---

            // --- Process results ---
            const allNotes = [];
            const cardStats = [];
            let failedSections = 0;

            results.forEach((result, index) => {
                if (result.status === 'fulfilled') {
                    const { note, stats } = result.value;
                    allNotes.push(note);
                    cardStats.push(stats);
                } else {
                    const sectionTitle = jsonConfig[index] ? jsonConfig[index].title : `Section ${index + 1}`;
                    console.error(`Failed to process section "${sectionTitle}":`, result.reason);
                    failedSections++;
                }
            });

            allNotes.sort((a, b) => a.fields[0].localeCompare(b.fields[0]));
            allNotes.forEach(note => d.addNote(note));
            
            if (failedSections > 0) {
                const successfulCards = allNotes.length;
                console.warn(`${filePrefix} ${failedSections} card(s) failed to generate. ${successfulCards} card(s) were created successfully.`);
            }

            updateProgress(`${filePrefix}Creating .apkg file...`, progressStep(95));
            const p = new Package();
            p.addDeck(d);
            const apkgArrayBuffer = await p.writeToFile(`${deckName}.apkg`);

            const blob = new Blob([apkgArrayBuffer], { type: 'application/octet-stream' });
            const url = URL.createObjectURL(blob);
            const downloadLink = document.createElement('a');
            downloadLink.href = url;
            downloadLink.download = `${deckName}.apkg`;
            downloadLink.textContent = `Download ${deckName}.apkg`;
            downloadArea.appendChild(downloadLink);

            updateStats(deckName, allNotes.length, cardStats, pdfDoc.numPages);
        }


        /**
         * Renders a single page to an <img> tag string.
         * --- MODIFIED with auto-cropping padding ---
         */
        async function renderImageForPage(pdfDoc, pageNum) {
            // Get options
            const compressImages = compressImagesCheckbox.checked;
            const autoCrop = autoCropCheckbox.checked;
            const maxResolution = parseInt(maxResolutionInput.value);
            const maxSizeKB = parseInt(maxSizeInput.value);

            const page = await pdfDoc.getPage(pageNum);
            const scale = 2; // Render at 2x for clarity
            const viewport = page.getViewport({ scale });

            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d', { willReadFrequently: true });
            canvas.height = viewport.height;
            canvas.width = viewport.width;

            await page.render({ 
                canvasContext: context, 
                viewport,
                willReadFrequently: true 
            }).promise;

            // --- AUTO-CROP LOGIC ---
            let finalCanvas = canvas; // Default to the original canvas

            if (autoCrop) {
                try {
                    const { data, width, height } = context.getImageData(0, 0, canvas.width, canvas.height);
                    const trimThreshold = 250; // Pixels lighter than this (per channel) are "white"
                    const padding = 15; // <-- *** PADDING ADDED ***

                    // Helper to check if a pixel has content
                    const isContent = (index) => {
                        const r = data[index];
                        const g = data[index + 1];
                        const b = data[index + 2];
                        const a = data[index + 3];
                        return a > 0 && (r < trimThreshold || g < trimThreshold || b < trimThreshold);
                    };

                    let cropTop = 0, cropBottom = height, cropLeft = 0, cropRight = width;
                    let foundTop = false, foundBottom = false, foundLeft = false, foundRight = false;

                    // Find Top
                    for (let y = 0; y < height; y++) {
                        for (let x = 0; x < width; x++) {
                            if (isContent((y * width + x) * 4)) {
                                cropTop = y;
                                foundTop = true;
                                break;
                            }
                        }
                        if (foundTop) break;
                    }

                    // Find Bottom
                    if (foundTop) { // Only search if the slide isn't blank
                        for (let y = height - 1; y >= cropTop; y--) {
                            for (let x = 0; x < width; x++) {
                                if (isContent((y * width + x) * 4)) {
                                    cropBottom = y + 1; // +1 to make it exclusive
                                    foundBottom = true;
                                    break;
                                }
                            }
                            if (foundBottom) break;
                        }

                        // Find Left
                        for (let x = 0; x < width; x++) {
                            for (let y = cropTop; y < cropBottom; y++) {
                                if (isContent((y * width + x) * 4)) {
                                    cropLeft = x;
                                    foundLeft = true;
                                    break;
                                }
                            }
                            if (foundLeft) break;
                        }

                        // Find Right
                        for (let x = width - 1; x >= cropLeft; x--) {
                            for (let y = cropTop; y < cropBottom; y++) {
                                if (isContent((y * width + x) * 4)) {
                                    cropRight = x + 1; // +1 to make it exclusive
                                    foundRight = true;
                                    break;
                                }
                            }
                            if (foundRight) break;
                        }

                        // *** APPLY PADDING to the crop box ***
                        cropTop = Math.max(0, cropTop - padding);
                        cropBottom = Math.min(height, cropBottom + padding);
                        cropLeft = Math.max(0, cropLeft - padding);
                        cropRight = Math.min(width, cropRight + padding);

                        // Apply the crop if valid
                        const newWidth = cropRight - cropLeft;
                        const newHeight = cropBottom - cropTop;

                        if (newWidth > 0 && newHeight > 0) {
                            const cropCanvas = document.createElement('canvas');
                            const cropCtx = cropCanvas.getContext('2d');
                            cropCanvas.width = newWidth;
                            cropCanvas.height = newHeight;
                            
                            cropCtx.drawImage(
                                canvas,
                                cropLeft, cropTop, newWidth, newHeight, // Source (x, y, w, h)
                                0, 0, newWidth, newHeight             // Destination (x, y, w, h)
                            );
                            finalCanvas = cropCanvas; // Use the new cropped canvas
                        }
                    }
                } catch (e) {
                    console.error(`Auto-cropping failed for page ${pageNum}: ${e.message}. Using original image.`);
                    // Fallback: finalCanvas is already set to the original canvas
                }
            }
            // --- END AUTO-CROP LOGIC ---

            // Use the finalCanvas (either original or cropped) to generate the image
            let imageData = finalCanvas.toDataURL('image/jpeg', 0.9);

            // *** COMPRESSION LOGIC ***
            // This runs *after* cropping, using the imageData from finalCanvas
            if (compressImages) {
                const response = await fetch(imageData);
                const blob = await response.blob();
                const options = {
                    maxSizeMB: maxSizeKB / 1024,
                    maxWidthOrHeight: maxResolution,
                    useWebWorker: true,
                };
                try {
                    const compressedImage = await imageCompression(blob, options);
                    const reader = new FileReader();
                    reader.readAsDataURL(compressedImage);
                    await new Promise(resolve => reader.onload = resolve);
                    imageData = reader.result;
                } catch (error) {
                    console.error(`Image compression failed for page ${pageNum}:`, error);
                }
            }

            return `<img src="${imageData}">`;
        }

        /**
         * Renders the specified pages into a combined string of <img> tags.
         */
        async function renderImagesForPages(pdfDoc, pagesArray) {
            let combinedImageHtml = '';
            for (const [index, pageNum] of pagesArray.entries()) {
                const imageHtml = await renderImageForPage(pdfDoc, pageNum);
                combinedImageHtml += imageHtml;
                if (index < pagesArray.length - 1) {
                    combinedImageHtml += '<br>'; 
                }
            }
            return { combinedImageHtml, pageNum: pagesArray[0] };
        }

        /**
         * Extracts text from a single page.
         */
        async function extractTextForPage(pdfDoc, pageNum) {
            const page = await pdfDoc.getPage(pageNum);
            const textContent = await page.getTextContent();
            return `\n--- Slide (Page ${pageNum}) ---\n` + textContent.items.map(item => item.str).join(' ');
        }


        /**
         * Extracts text from a specific list of pages.
         */
        async function extractTextForPages(pdfDoc, pagesArray) {
            let groupedText = '';
            for (const pageNum of pagesArray) {
                groupedText += await extractTextForPage(pdfDoc, pageNum);
            }
            return groupedText.trim();
        }

        /**
        * Second Gemini call: To explain the content of a *group* of slides.
        */
        async function callGeminiForExplanation(groupedText) {
            const prompt = `
                Task:
                You will be given the text from a set of presentation slides on a specific topic.
                Your task is to provide a clear, comprehensive, and well-structured explanation of the content, as if you were teaching it to a student.
                
                Instructions:
                - **Language:** Respond in the **same language** as the provided slide text.
                - Do not just repeat the slide's bullet points.
                - Elaborate on the concepts, connect the ideas, and provide context.
                - Structure your explanation using simple HTML tags like <p>, <ul>, <li>, and <i>.
                - **For emphasis/bolding, use <b>...</b> tags. DO NOT use markdown asterisks (\`**...**\`).**
                - **Crucially for formulas (Anki/MathJax format):**
                    - For **inline math**, use the format: \\(...\\) (e.g., \\( E = mc^2 \\)).
                    - For **display/block math**, use the format: \\[...\\] (e.g., \\[ \\sum_{i=1}^{n} i = \\frac{n(n+1)}{2} \\]).
                    - **DO NOT** use single dollar signs ($...$) for math.
                - Respond ONLY with the HTML-formatted explanation. Do not add any preamble like "Here is the explanation:", "Sure!", or markdown fences.
                
                Here is the slide text:
                ${groupedText}
            `;

            try {
                return await callGeminiWithRetry(prompt); 
            } catch (error) {
                console.error("Error in explanation call:", error);
                return `<p>(AI explanation failed: ${error.message})</p>`;
            }
        }

        /**
        * Third Gemini call: To annotate a *single* slide, only if needed.
        */
        async function callGeminiForSlideAnnotation(singlePageText) {
            const prompt = `
                Task:
                You will be given the text from a single presentation slide.
                Your task is to provide a brief, clarifying explanation (an "annotation") for this slide *only if it is not self-explanatory*.

                Instructions:
                1.  **Analyze the text:**
                    - If the slide text is just a title, a formula, a diagram description, or a list of keywords, it **needs** an explanation.
                    - If the slide text is already a set of complete sentences or self-explanatory bullet points, it **does not** need an explanation.
                2.  **Response Format (Crucial!):**
                    - If an explanation is needed: Respond ONLY with the explanation, formatted in simple HTML.
                      - Use tags like <p>, <ul>, <li>.
                      - **For bolding, use <b>...</b> tags, NOT markdown asterisks (\`**...**\`).**
                      - Use MathJax format (\\(...\\) and \\[...\\]) for any math. Keep it brief.
                    - If no explanation is needed: Respond ONLY with the exact string "".
                3.  **DO NOT** add any other preamble, markdown, or text.
                4.  **Language:** Respond in the **same language** as the provided slide text.

                Here is the slide text:
                ${singlePageText}
            `;

            try {
                return await callGeminiWithRetry(prompt);
            } catch (error) {
                console.error("Error in annotation call:", error);
                return `<p>(AI annotation failed: ${error.message})</p>`;
            }
        }


        // --- Utility Functions ---
        function updateStats(deckName, totalCards, cardStats, totalPages) {
            let statsHTML = `<h3>Stats for ${deckName}</h3>`;
            statsHTML += `<p>Total PDF pages: ${totalPages}</p>`;
            statsHTML += `<p>Total Anki cards created: ${totalCards}</p>`;
            statsHTML += `<h4>Card details (based on AI grouping):</h4>`;
            statsHTML += `<ul>`;
            for (const [title, imageCount, pageNum] of cardStats) {
                statsHTML += `<li>"${title}": ${imageCount} slide${imageCount !== 1 ? 's' : ''} (starting from page ${pageNum})</li>`;
            }
            statsHTML += `</ul>`;
            statsArea.innerHTML = statsHTML;
        }

        var coll = document.getElementsByClassName("collapsible");
        for (let i = 0; i < coll.length; i++) {
            coll[i].addEventListener("click", function () {
                this.classList.toggle("active");
                var content = this.nextElementSibling;
                if (content.style.display === "block") {
                    content.style.display = "none";
                } else {
                    content.style.display = "block";
                }
            });
        }
    </script>
